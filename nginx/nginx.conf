events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream rag_server {
        server rag-server:8000;
    }

    upstream graph_api {
        server graph-api:8080;
    }

    upstream gateway {
        server gateway:6000;
    }

    server {
        listen 80;
        server_name localhost;

        # RAG Server Endpoints
        location /rag/ {
            proxy_pass http://rag_server/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Graph API Endpoints
        location /graph/ {
            proxy_pass http://graph_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Main Server (Go) Endpoints
        location / {
            proxy_pass http://gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
